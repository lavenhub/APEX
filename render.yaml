services:
  - type: web
    name: apex-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # User must set this manually in Render UI
      - key: PYTHON_VERSION
        value: 3.10.12
